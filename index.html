<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Report Signup</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>❄️ Snow Report ❄️</h1>
        <h5 class="subtitle">Daily/weekly updates for your favorite slopes</h5>

        <form id="skiForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="yourname@example.com" required>
            </div>

            <!-- SEARCHABLE DROPDOWN -->
            <div class="form-group dropdown">
                <label>Search Resort</label>
                <input type="text" id="resortSearch" placeholder="Type resort name..." autocomplete="off" />
                <div id="dropdownList" class="dropdown-list"></div>
            </div>

            <div class="form-group">
                <label>Or Use Custom Coordinates</label>
            </div>

            <div class="form-group">
                <label>Latitude</label>
                <input type="number" id="latitude" step="0.001" placeholder="46.923" required>
            </div>

            <div class="form-group">
                <label>Longitude</label>
                <input type="number" id="longitude" step="0.001" placeholder="-121.476" required>
            </div>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" value="daily"> Daily Report
                </label>

                <label>
                    <input type="checkbox" value="weekly"> Weekly Report
                </label>
            </div>

            <button type="submit" class="submit-btn">
                Subscribe
            </button>

            <p class="info-text">
                Your data will only be used to send reports.
            </p>
        </form>
    </div>

    <script>
        const searchInput = document.getElementById("resortSearch")
        const dropdownList = document.getElementById("dropdownList")

        const latitudeInput = document.getElementById("latitude")
        const longitudeInput = document.getElementById("longitude")

        const form = document.getElementById("skiForm")
        const emailInput = document.getElementById("email")

        let resorts = []

        //Load Resorts Database
        fetch("resorts.json")
            .then(res => res.json())
            .then(data => resorts = data)

        //Dropdown Search Logic
        searchInput.addEventListener("focus", showDropdown)
        searchInput.addEventListener("input", filterResorts)

        function showDropdown() {
            dropdownList.style.display = "block"
            filterResorts()
        }

        document.addEventListener("click", e => {
            if (!e.target.closest(".dropdown")) {
                dropdownList.style.display = "none"
            }
        })

        function filterResorts() {
            dropdownList.innerHTML = ""
            const query = searchInput.value.toLowerCase()

            const matches = resorts.filter(r =>
                r.name.toLowerCase().includes(query)
            )

            matches.forEach(resort => {
                const div = document.createElement("div")
                div.className = "dropdown-item"
                div.textContent = resort.name

                div.onclick = () => {
                    searchInput.value = resort.name
                    latitudeInput.value = resort.lat
                    longitudeInput.value = resort.lon
                    latitudeInput.disabled = true
                    longitudeInput.disabled = true
                    dropdownList.style.display = "none"
                }
                dropdownList.appendChild(div)
            })
        }

        //Allow Custom Coordinates
        latitudeInput.addEventListener("input", resetSearch)
        longitudeInput.addEventListener("input", resetSearch)

        function resetSearch() {
            searchInput.value = ""
            latitudeInput.disabled = false
            longitudeInput.disabled = false
        }

        //Form Submit
        form.addEventListener("submit", function (e) {
            e.preventDefault()
            const selectedResortName = searchInput.value || null

            const data = {
                latitude: latitudeInput.value,
                longitude: longitudeInput.value,
                resort_name: selectedResortName,
                email: emailInput.value,
                daily: document.querySelector('input[value="daily"]').checked,
                weekly: document.querySelector('input[value="weekly"]').checked
            }

            if (!data.daily && !data.weekly) {
                alert("Select at least one report type")
                return
            }

            fetch("https://demetrius-sugared-superevangelically.ngrok-free.dev/api/subscribers", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "ngrok-skip-browser-warning": "true"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(result => {

                    if (result.success) {
                        alert("Signup successful!")
                        form.reset()

                        latitudeInput.disabled = false
                        longitudeInput.disabled = false
                    } else {
                        alert(result.error)
                    }

                })
                .catch(err => {
                    console.error(err)
                    alert("Failed to connect to server")
                })
        })
    </script>
</body>

</html>

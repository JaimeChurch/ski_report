<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Report Signup</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>❄️ Ski Report ❄️</h1>
        <p class="subtitle">Daily/weekly updates for your favorite slopes.</p>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <form id="skiForm">
            <div class="form-group">
                <label for="resort">SELECT A RESORT</label>
                <select id="resort" name="resort">
                    <option value="">-- Select a Resort --</option>
                    <option value="35.326,-111.686">Snowbowl, AZ</option>
                    <option value="33.936,-109.566">Sunrize Park, AZ</option>
                    <option value="37.650,-119.037">Mammoth, CA</option>
                    <option value="39.355,-120.258">Tahoe Donner, CA</option>
                    <option value="39.190,-106.948">Snowmass, CO</option>
                    <option value="37.936,-107.845">Tellride, CO</option>
                    <option value="39.606,-106.355">Vail, CO</option>
                    <option value="43.486,-114.829">Soldier Mt., ID</option>
                    <option value="46.753,-112.313">Great Divide, MO</option>
                    <option value="47.014,-113.999">Montana Snowbowl, MO</option>
                    <option value="36.376,-105.238">Angel Fire, NM</option>
                    <option value="36.304,-115.680">Lee Canyon, NV</option>
                    <option value="39.336,-119.888">Mt. Rose, NV</option>
                    <option value="44.963,-118.234">Anthony Lake, OR</option>
                    <option value="43.97938,-121.68851">Mount Bachelor, OR</option>
                    <option value="45.37351,-121.69588">Mount Hood, OR</option>
                    <option value="37.705,-112.850">Brian Head, UT</option>
                    <option value="38.320,-112.384">Eagle Point, UT</option>
                    <option value="40.391,-111.578">Sundance, UT</option>
                    <option value="46.923,-121.476">Crystal Mountain, WA</option>
                    <option value="47.292,-120.400">Mission Ridge, WA</option>
                    <option value="47.925,-117.113">Mt. Spokane, WA</option>
                    <option value="47.40595,-121.41297">Snoqualmie Pass, WA</option>
                    <option value="47.744,-121.089">Stevens Pass, WA</option>
                    <option value="44.073,-107.340">Meadowlark, WY</option>
                    <option value="41.341,-106.184">Snowy Ridge, WY</option>
                    <option value="42.978,-109.739">White Pine, WY</option>
                </select>
            </div>

            <div class="form-group">
                <label for="latitude">OR USE CUSTOM COORDINATES</label>
            </div>
  
            <div class="form-group">
                <label for="latitude">Latitude</label>
                <input type="number" id="latitude" name="latitude" step="0.001" placeholder="46.92" required>
            </div>

            <div class="form-group">
                <label for="longitude">Longitude</label>
                <input type="number" id="longitude" name="longitude" step="0.001" placeholder="-121.48" required>
            </div>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="reports" value="daily">
                    Daily Report
                </label>
                <label>
                    <input type="checkbox" name="reports" value="weekly">
                    Weekly Report
                </label>
            </div>

            <button type="submit" class="submit-btn">Subscribe</button>

            <p class="info-text">Your data will only be used to send you reports.</p>
        </form>
    </div>

    <script>
        const form = document.getElementById('skiForm');
        const resortSelect = document.getElementById('resort');
        const latitudeInput = document.getElementById('latitude');
        const longitudeInput = document.getElementById('longitude');

// Populate lat/long when resort is selected
        resortSelect.addEventListener('change', function () {
            if (this.value) {
                const [lat, lon] = this.value.split(',');
                latitudeInput.value = lat;
                longitudeInput.value = lon;
            } else {
                latitudeInput.value = '';
                longitudeInput.value = '';
            }
        });

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const latitude = document.getElementById('latitude').value;
            const longitude = document.getElementById('longitude').value;
            const email = document.getElementById('email').value;
            const daily = document.querySelector('input[value="daily"]').checked;
            const weekly = document.querySelector('input[value="weekly"]').checked;

            if (!daily && !weekly) {
                alert('Please select at least one report type');
                return;
            }

            const data = {
                latitude: latitude,
                longitude: longitude,
                email: email,
                daily: daily,
                weekly: weekly
            };

            // Send to backend
            fetch('https://demetrius-sugared-superevangelically.ngrok-free.dev/api/subscribers', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true',
                    'User-Agent': 'Mozilla/5.0'
                },
                body: JSON.stringify(data)
            })
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        alert('Signup successful! Check your email to confirm.');
                        form.reset();
                    } else {
                        alert('Error: ' + result.error);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to connect to server');
                });
        });
    </script>
</body>

</html>
